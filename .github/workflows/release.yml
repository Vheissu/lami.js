name: Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run every release step without publishing to npm'
        required: true
        type: boolean
        default: true
      npm_tag:
        description: 'npm dist-tag to publish'
        required: true
        type: string
        default: latest

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, verify, and publish
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
      NPM_TAG: ${{ inputs.npm_tag || 'latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      - name: Show tool versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate release version
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const dryRun = process.env.DRY_RUN === 'true';
          const ref = process.env.GITHUB_REF ?? '';
          const refName = process.env.GITHUB_REF_NAME ?? '';
          const isReleaseTag = /^refs\/tags\/v/.test(ref);

          if (!dryRun && !isReleaseTag) {
            console.error('Actual npm publishing requires a v* git tag.');
            process.exit(1);
          }

          const packageFiles = [
            'package.json',
            'packages/runtime/package.json',
            'packages/compiler/package.json',
            'packages/ssr/package.json',
            'packages/web-component/package.json',
            'packages/vite/package.json'
          ];

          const manifests = packageFiles.map(file => ({
            file,
            manifest: JSON.parse(fs.readFileSync(file, 'utf8'))
          }));
          const rootVersion = manifests[0].manifest.version;

          for (const { file, manifest } of manifests) {
            if (manifest.version !== rootVersion) {
              console.error(`${file} is ${manifest.version}, expected ${rootVersion}.`);
              process.exit(1);
            }
          }

          if (isReleaseTag) {
            const tagVersion = refName.replace(/^v/, '');
            if (tagVersion !== rootVersion) {
              console.error(`Tag ${refName} does not match package version ${rootVersion}.`);
              process.exit(1);
            }
          }

          console.log(`Release version ${rootVersion} validated.`);
          NODE

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and performance smoke tests
        run: pnpm test:all

      - name: Production dependency audit
        run: pnpm audit --prod

      - name: Install browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Browser example tests
        run: pnpm test:e2e

      - name: Package smoke
        run: pnpm pack:smoke

      - name: Pack release tarballs
        run: pnpm release:pack npm-release

      - name: Upload release tarballs
        uses: actions/upload-artifact@v4
        with:
          name: npm-release-tarballs
          path: |
            npm-release/*.tgz
            npm-release/release-tarballs.json
          if-no-files-found: error

      - name: Configure npm token fallback
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "$NODE_AUTH_TOKEN" > ~/.npmrc
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          publish_flags=(--access public --tag "$NPM_TAG")
          if [ "$DRY_RUN" = "true" ]; then
            publish_flags+=(--dry-run)
          fi

          publish_one() {
            local package_name="$1"
            local pattern="$2"
            local matches=($pattern)
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "::error::Expected exactly one tarball for ${pattern}, found ${#matches[@]}"
              exit 1
            fi

            if [ "$DRY_RUN" != "true" ] && npm view "${package_name}@${GITHUB_REF_NAME#v}" version >/dev/null 2>&1; then
              echo "${package_name}@${GITHUB_REF_NAME#v} is already published; skipping."
              return 0
            fi

            npm publish "${matches[0]}" "${publish_flags[@]}"
          }

          publish_one "@lami.js/runtime" "./npm-release/lami.js-runtime-*.tgz"
          publish_one "@lami.js/compiler" "./npm-release/lami.js-compiler-*.tgz"
          publish_one "@lami.js/ssr" "./npm-release/lami.js-ssr-*.tgz"
          publish_one "@lami.js/web-component" "./npm-release/lami.js-web-component-*.tgz"
          publish_one "@lami.js/vite" "./npm-release/lami.js-vite-*.tgz"
